apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-lab
  labels:
    app: pipeline-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipeline-lab
  template:
    metadata:
      labels:
        app: pipeline-lab
    spec:
      containers:
        - name: pipeline-lab
          # IMAGE_PLACEHOLDER is replaced by Jenkins during the deploy stage
          # Phase 1 (Minikube): venki/pipeline-lab:<build-number>
          # Phase 2 (EKS):      <account-id>.dkr.ecr.<region>.amazonaws.com/pipeline-lab:<build-number>
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
